name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: WeightedDecisionMatrix-Windows
            asset_extension: zip
          - os: ubuntu-latest
            artifact_name: WeightedDecisionMatrix-Linux
            asset_extension: zip
          - os: macos-latest
            artifact_name: WeightedDecisionMatrix-macOS
            asset_extension: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller pyinstaller.spec
        shell: pwsh

      - name: Build with PyInstaller (Unix)
        if: runner.os != 'Windows'
        run: |
          pyinstaller pyinstaller.spec

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path dist/WeightedDecisionMatrix/* -DestinationPath ${{ matrix.artifact_name }}.zip
        shell: pwsh

      - name: Create archive (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist/WeightedDecisionMatrix
          zip -r ../../${{ matrix.artifact_name }}.zip .
          cd ../..

      - name: Create archive (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist/WeightedDecisionMatrix
          zip -r ../../${{ matrix.artifact_name }}.zip .
          cd ../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/WeightedDecisionMatrix-Windows/WeightedDecisionMatrix-Windows.zip
            artifacts/WeightedDecisionMatrix-Linux/WeightedDecisionMatrix-Linux.zip
            artifacts/WeightedDecisionMatrix-macOS/WeightedDecisionMatrix-macOS.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
